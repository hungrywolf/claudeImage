name: claude-box

services:
  claude:
    build:
      context: .
      args:
        # Pin a version here if you ever need to, e.g. CLAUDE_VERSION: 1.2.3
        CLAUDE_VERSION: ${CLAUDE_VERSION:-latest}
        # Proxy at BUILD time so apt + npm can reach the internet behind a proxy.
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    image: claude-box:latest

    # Interactive terminal so the Claude TUI works.
    stdin_open: true
    tty: true
    init: true

    # Where Claude runs. Your git directory is mounted here.
    working_dir: /workspace

    environment:
      - TERM=${TERM:-xterm-256color}
      # Point Claude at the mounted config dir (also baked into the image).
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      # Proxy at RUNTIME for Claude, git, npm, curl. Both cases — some tools read
      # the lowercase form (libcurl/git), others the uppercase (Node/Claude).
      # All empty by default => no proxy, no effect.
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,::1}
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
      - no_proxy=${NO_PROXY:-localhost,127.0.0.1,::1}

    volumes:
      # --- your code: the whole github dir, read-write ---
      - "${GIT_DIR:?set GIT_DIR in .env}:/workspace"

      # --- isolated Claude config for the container (seeded from your real
      #     ~/.claude by seed-config.sh). Lives on the Windows PC at BOX_DIR.
      #     Kept separate so in-container plugin installs use Linux paths and
      #     never touch your real config. ---
      - "${BOX_DIR:?set BOX_DIR in .env (run install.sh)}/.claude:/home/node/.claude"
      - "${BOX_DIR}/.claude.json:/home/node/.claude.json"

      # --- your shell: host .bashrc sourced inside the container (read-only) ---
      - "${CLAUDE_HOME}/.bashrc:/home/node/.host-bashrc:ro"
      # Linux-side overrides sourced AFTER it (GitHome=/workspace, winpty no-op…).
      - "./container.bashrc:/home/node/.container-bashrc:ro"
      # Optional: make your ~/scripts aliases (generatewp, createwp…) work too.
      # - "${CLAUDE_HOME}/scripts:/home/node/scripts:ro"

      # --- git / ssh identity for clone & push (read-only) ---
      - "${CLAUDE_HOME}/.gitconfig:/home/node/.gitconfig:ro"
      - "${CLAUDE_HOME}/.ssh:/home/node/.ssh:ro"
